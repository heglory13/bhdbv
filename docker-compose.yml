services:
  postgres:
    image: postgres:16
    container_name: dbv-insurance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dbv_insurance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/dbv_insurance
      JWT_SECRET: change-this-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://backend:4000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
